<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時段網址封鎖器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            width: 340px;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 12px;
            background: #f5f5f5;
        }
        h2 {
            text-align: center;
            color: #333;
            margin: 0 0 12px;
            font-size: 16px;
        }
        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin: 0 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #eee;
        }
        .card-title.edit-mode { color: #1976d2; }

        .form-group { margin-bottom: 10px; }
        .form-group:last-of-type { margin-bottom: 0; }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 12px;
            color: #444;
        }
        textarea, input[type="time"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        textarea { resize: none; }

        .time-row { display: flex; gap: 8px; }
        .time-row .form-group { flex: 1; margin-bottom: 0; }

        .weekday-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .weekday-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .weekday-group label {
            font-weight: normal;
            font-size: 12px;
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }
        .weekday-group input[type="checkbox"] { width: auto; }

        /* Buttons */
        button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            padding: 7px 12px;
        }
        button:hover { filter: brightness(0.9); }

        #toggleAll {
            background: #607d8b;
            padding: 3px 8px;
            font-size: 11px;
        }
        #saveRule { width: 100%; margin-top: 10px; font-size: 14px; padding: 8px; }
        #cancelEdit {
            width: 100%;
            margin-top: 6px;
            background: #9e9e9e;
            font-size: 13px;
            padding: 6px;
        }

        /* Status */
        #status {
            text-align: center;
            font-size: 12px;
            min-height: 18px;
            margin: 4px 0;
            color: #388e3c;
        }
        #status.error { color: #d32f2f; }

        /* Rules list */
        #rulesList { margin-top: 4px; }

        .rule-item {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #fafafa;
            font-size: 12px;
        }
        .rule-item.active-now {
            border-color: #ef9a9a;
            background: #fff8f8;
        }
        .rule-item.disabled { opacity: 0.5; }

        .rule-item-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
        }
        .rule-urls {
            font-weight: bold;
            color: #333;
            word-break: break-all;
            flex: 1;
            font-size: 12px;
        }
        .rule-btns { display: flex; gap: 4px; flex-shrink: 0; }
        .rule-btns button { padding: 3px 7px; font-size: 11px; }

        .btn-edit   { background: #1976d2; }
        .btn-toggle { background: #f57c00; }
        .btn-delete { background: #d32f2f; }

        .rule-meta { color: #666; line-height: 1.6; }
        .badge-active {
            display: inline-block;
            background: #ffcdd2;
            color: #b71c1c;
            border-radius: 8px;
            padding: 0 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .empty-hint { color: #999; font-size: 13px; text-align: center; padding: 8px 0; }
    </style>
</head>
<body>
    <h2>時段網址封鎖器</h2>

    <!-- Add / Edit form -->
    <div class="card" id="ruleForm">
        <div class="card-title" id="formTitle">＋ 新增規則</div>

        <div class="form-group">
            <label>封鎖網域（每行一個）：</label>
            <textarea id="urls" rows="3" placeholder="例如：facebook.com&#10;youtube.com"></textarea>
        </div>

        <div class="time-row">
            <div class="form-group">
                <label>開始時間：</label>
                <input type="time" id="startTime" value="08:00">
            </div>
            <div class="form-group">
                <label>結束時間：</label>
                <input type="time" id="endTime" value="22:00">
            </div>
        </div>

        <div class="form-group" style="margin-top:10px;">
            <div class="weekday-header">
                <label style="margin:0;">週幾：</label>
                <button id="toggleAll">取消全選</button>
            </div>
            <div class="weekday-group" id="weekdayGroup">
                <label><input type="checkbox" value="1" checked> 一</label>
                <label><input type="checkbox" value="2" checked> 二</label>
                <label><input type="checkbox" value="3" checked> 三</label>
                <label><input type="checkbox" value="4" checked> 四</label>
                <label><input type="checkbox" value="5" checked> 五</label>
                <label><input type="checkbox" value="6" checked> 六</label>
                <label><input type="checkbox" value="0" checked> 日</label>
            </div>
        </div>

        <input type="hidden" id="editingId">
        <button id="saveRule">儲存規則</button>
        <button id="cancelEdit" style="display:none;">取消編輯</button>
    </div>

    <div id="status"></div>

    <!-- Rules list -->
    <div class="card">
        <div class="card-title">所有規則</div>
        <div id="rulesList"><p class="empty-hint">載入中…</p></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
